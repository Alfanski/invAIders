name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run validate

  deploy-convex:
    name: Deploy Convex
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Deploy to Convex and set env vars
        run: bash scripts/deploy-prod.sh
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CONVEX_WEBHOOK_SECRET: ${{ secrets.CONVEX_WEBHOOK_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          N8N_STRAVA_WEBHOOK_URL: ${{ secrets.N8N_STRAVA_WEBHOOK_URL }}
          APP_URL: ${{ secrets.APP_URL }}

  sync-vercel-env:
    name: Sync Vercel Env Vars
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync env vars to Vercel
        run: bash scripts/sync-vercel-env.sh STRAVA_CLIENT_ID STRAVA_CLIENT_SECRET SESSION_SECRET STRAVA_WEBHOOK_VERIFY_TOKEN N8N_STRAVA_WEBHOOK_URL GROQ_API_KEY CONVEX_WEBHOOK_SECRET INTERNAL_API_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          STRAVA_WEBHOOK_VERIFY_TOKEN: ${{ secrets.STRAVA_WEBHOOK_VERIFY_TOKEN }}
          N8N_STRAVA_WEBHOOK_URL: ${{ secrets.N8N_STRAVA_WEBHOOK_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CONVEX_WEBHOOK_SECRET: ${{ secrets.CONVEX_WEBHOOK_SECRET }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}

  sync-n8n-env:
    name: Sync n8n Variables
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync variables to n8n Cloud
        run: bash scripts/sync-n8n-env.sh GROQ_API_KEY CONVEX_WEBHOOK_SECRET ELEVENLABS_API_KEY
        env:
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CONVEX_WEBHOOK_SECRET: ${{ secrets.CONVEX_WEBHOOK_SECRET }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}

  deploy-n8n:
    name: Deploy n8n Workflows
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for n8n changes
        id: changes
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^n8n/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push workflows to n8n Cloud
        if: steps.changes.outputs.changed == 'true'
        env:
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          for file in n8n/workflows/*.json; do
            [ -f "$file" ] || continue

            workflow_id=$(python3 -c "import json; print(json.load(open('$file')).get('id',''))" 2>/dev/null || echo "")
            name=$(python3 -c "import json; print(json.load(open('$file')).get('name','unknown'))" 2>/dev/null || echo "unknown")

            # n8n API treats these fields as read-only; strip them from the request body
            tmpfile=$(mktemp)
            python3 -c "
          import json
          d = json.load(open('$file'))
          for k in ['id', 'active', 'updatedAt', 'createdAt']:
              d.pop(k, None)
          json.dump(d, open('$tmpfile', 'w'))
          "

            if [ -n "$workflow_id" ]; then
              echo "Updating workflow '$name' (id: $workflow_id)..."
              http_code=$(curl -s -o /tmp/n8n_resp.json -w "%{http_code}" -X PUT \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                -H "Content-Type: application/json" \
                -d @"$tmpfile" \
                "${N8N_BASE_URL}/api/v1/workflows/${workflow_id}")
              if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                echo "  Updated: $workflow_id"
              else
                echo "::error::Failed to update workflow '$name' (HTTP $http_code): $(cat /tmp/n8n_resp.json)"
                rm -f "$tmpfile"
                exit 1
              fi
            else
              echo "Creating workflow '$name'..."
              http_code=$(curl -s -o /tmp/n8n_resp.json -w "%{http_code}" -X POST \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                -H "Content-Type: application/json" \
                -d @"$tmpfile" \
                "${N8N_BASE_URL}/api/v1/workflows")
              if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                echo "  Created: $(python3 -c "import json; print(json.load(open('/tmp/n8n_resp.json')).get('id','?'))")"
              else
                echo "::error::Failed to create workflow '$name' (HTTP $http_code): $(cat /tmp/n8n_resp.json)"
                rm -f "$tmpfile"
                exit 1
              fi
            fi
            rm -f "$tmpfile"
          done
